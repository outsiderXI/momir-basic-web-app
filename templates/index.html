<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Momir Basic Printer</title>
  <meta name="theme-color" content="#020403">
  <link rel="manifest" href="/manifest.json">
  <style>
    :root {
      --bg: #f3f6ee;
      --surface: #fbfff5;
      --surface-2: #edf6e8;
      --line: #9fb99f;
      --line-strong: #4e7f54;
      --text: #102314;
      --muted: #47634b;
      --accent: #0f7a31;
      --accent-2: #155e2f;
      --danger: #a4161a;
      --success: #0a7a2d;
      --glow: rgba(15, 122, 49, .18);
      --shadow: 0 10px 22px rgba(16, 35, 20, .10);
      --mono: "Cascadia Mono", "Cascadia Code", "Consolas", "SFMono-Regular", "Menlo", "Monaco", monospace;
    }

    [data-theme="dark"] {
      --bg: #020403;
      --surface: #050b07;
      --surface-2: #08150c;
      --line: #16401f;
      --line-strong: #25a244;
      --text: #d6ffe1;
      --muted: #78b989;
      --accent: #39ff6a;
      --accent-2: #19c84b;
      --danger: #ff5c6f;
      --success: #39ff6a;
      --glow: rgba(57, 255, 106, .24);
      --shadow: 0 14px 36px rgba(0, 0, 0, .55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--mono);
      color: var(--text);
      background: var(--bg);
      background-image:
        linear-gradient(rgba(15, 122, 49, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15, 122, 49, .025) 1px, transparent 1px);
      background-size: 18px 18px;
    }

    [data-theme="dark"] body {
      background-image:
        linear-gradient(rgba(57, 255, 106, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 106, .03) 1px, transparent 1px);
    }

    .wrap {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 3px;
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      gap: 12px;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-top: 2px solid var(--accent);
      opacity: .86;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: 1.55rem;
      line-height: 1.1;
      color: var(--accent);
      letter-spacing: 0;
      text-shadow: 0 0 14px var(--glow);
    }

    h2 {
      color: var(--text);
      font-size: 1rem;
      line-height: 1.2;
      font-weight: 760;
      text-transform: uppercase;
    }

    h2::before {
      content: "> ";
      color: var(--accent);
    }

    h3 {
      font-size: .95rem;
      line-height: 1.2;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 2px 0 4px;
    }

    .brand {
      display: grid;
      gap: 4px;
    }

    .install {
      width: auto;
      min-width: 112px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .theme-toggle {
      width: auto;
      min-width: 112px;
    }

    .cmc-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .cmc-grid button {
      min-height: 46px;
      font-size: 1rem;
    }

    button, input {
      border: 1px solid var(--line-strong);
      border-radius: 3px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
    }

    button {
      min-height: 44px;
      padding: 10px 12px;
      font-weight: 750;
      cursor: pointer;
      box-shadow: none;
      text-transform: uppercase;
    }

    button:hover:not(:disabled) {
      background: var(--surface-2);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    button:disabled { opacity: .6; cursor: wait; }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    button.primary:hover:not(:disabled) {
      background: var(--accent-2);
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px var(--glow), 0 0 18px var(--glow);
    }

    [data-theme="dark"] button.primary {
      color: #020403;
      text-shadow: none;
    }

    button.secondary {
      background: var(--surface);
      color: var(--text);
      border-color: var(--line-strong);
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      box-shadow: none;
    }

    input:focus {
      outline: 2px solid var(--glow);
      outline-offset: 2px;
      border-color: var(--accent);
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .88rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: .92rem;
    }

    .status.error { color: var(--danger); }
    .status.good { color: var(--success); }

    .options {
      display: grid;
      gap: 10px;
    }

    .choice, .history-item {
      display: grid;
      gap: 8px;
      padding: 12px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 3px;
      color: var(--text);
      box-shadow: none;
    }

    .choice {
      grid-template-columns: 72px 1fr;
      align-items: start;
    }

    .choice img {
      width: 72px;
      border-radius: 3px;
      border: 1px solid var(--line);
      background: #111827;
    }

    [data-theme="dark"] .choice img {
      background: #020403;
    }

    .choice-body {
      display: grid;
      gap: 8px;
    }

    .choice-title, .history-title {
      font-weight: 800;
      line-height: 1.2;
      color: var(--accent);
    }

    .meta {
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.35;
    }

    .oracle {
      color: var(--text);
      font-size: .88rem;
      line-height: 1.35;
      white-space: pre-line;
      padding-top: 6px;
      border-top: 1px solid var(--line);
    }

    .selected {
      display: none;
      gap: 10px;
      padding-top: 2px;
    }

    .selected.active {
      display: grid;
    }

    .history {
      display: grid;
      gap: 10px;
    }

    .history-panel {
      grid-column: 1 / -1;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .history-toggle {
      min-width: 96px;
    }

    .history-body {
      display: grid;
      gap: 10px;
    }

    .history-panel.collapsed .history-body {
      display: none;
    }

    .history-item {
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .history-actions button {
      min-height: 36px;
      padding: 8px 10px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 16px;
      background: rgba(15, 23, 42, .48);
      z-index: 20;
    }

    [data-theme="dark"] .modal-backdrop {
      background: rgba(0, 0, 0, .76);
    }

    .modal-backdrop.active {
      display: grid;
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(82vh, 760px);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 3px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .28);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .modal-list {
      display: grid;
      gap: 10px;
      overflow: auto;
      padding: 14px 16px 16px;
    }

    .modal-close {
      width: 44px;
      min-width: 44px;
      padding: 0;
      border-radius: 3px;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .wrap { padding: 12px; }
      .topbar { align-items: start; }
      .row { grid-template-columns: 1fr; }
      .cmc-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .choice { grid-template-columns: 58px 1fr; }
      .choice img { width: 58px; }
    }
  </style>
</head>
<body>
<main class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Momir Basic Printer</h1>
    </div>
    <div class="top-actions">
      <button id="themeToggle" class="secondary theme-toggle" type="button">Dark Mode</button>
      <button id="installBtn" class="secondary install" hidden>Install</button>
    </div>
  </div>

  <div class="grid">
    <section class="panel momir">
      <h2>Momir Basic</h2>
      <div class="cmc-grid" id="cmcGrid"></div>
      <div id="momirStatus" class="status"></div>
    </section>

    <section class="panel token">
      <h2>Token Print</h2>
      <label>
        Token name
        <input id="tokenQuery" autocomplete="off" placeholder="Rat">
      </label>
      <div class="row">
        <label>
          Copies
          <input id="tokenCopies" type="number" min="1" max="20" value="1">
        </label>
        <button id="tokenPrintBtn" class="primary">Print Card</button>
      </div>
      <div id="tokenStatus" class="status"></div>
    </section>

    <section class="panel card-search">
      <h2>Any Card Print</h2>
      <label>
        Card name
        <input id="cardQuery" autocomplete="off" placeholder="Sol Ring">
      </label>
      <div class="row">
        <label>
          Copies
          <input id="cardCopies" type="number" min="1" max="20" value="1">
        </label>
        <button id="cardPrintBtn" class="primary">Print Card</button>
      </div>
      <div id="cardStatus" class="status"></div>
    </section>

    <section id="historyPanel" class="panel history-panel collapsed">
      <div class="history-head">
        <h2>Print History</h2>
        <button id="historyToggle" class="secondary history-toggle" type="button">Show</button>
      </div>
      <div class="history-body">
        <div id="historyStatus" class="status"></div>
        <div id="historyList" class="history"></div>
      </div>
    </section>
  </div>
</main>

<div id="choiceModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Choose Print</h2>
      <button id="modalClose" class="secondary modal-close" aria-label="Close">X</button>
    </div>
    <div id="modalList" class="modal-list"></div>
  </div>
</div>

<script>
let deferredPrompt = null;
let modalMode = null;
let modalCopies = 1;

const cmcGrid = document.getElementById('cmcGrid');
const installBtn = document.getElementById('installBtn');
const themeToggle = document.getElementById('themeToggle');
const historyPanel = document.getElementById('historyPanel');
const historyToggle = document.getElementById('historyToggle');
const historyStatus = document.getElementById('historyStatus');
const historyList = document.getElementById('historyList');
const choiceModal = document.getElementById('choiceModal');
const modalTitle = document.getElementById('modalTitle');
const modalList = document.getElementById('modalList');
const modalClose = document.getElementById('modalClose');

const tokenQuery = document.getElementById('tokenQuery');
const tokenStatus = document.getElementById('tokenStatus');
const tokenCopies = document.getElementById('tokenCopies');
const tokenPrintBtn = document.getElementById('tokenPrintBtn');

const cardQuery = document.getElementById('cardQuery');
const cardStatus = document.getElementById('cardStatus');
const cardCopies = document.getElementById('cardCopies');
const cardPrintBtn = document.getElementById('cardPrintBtn');

function escapeHtml(text = '') {
  return String(text).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[m]));
}

function setStatus(el, message, kind = '') {
  el.className = `status ${kind}`.trim();
  el.textContent = message || '';
}

function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  themeToggle.textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
  localStorage.setItem('momir-theme', theme);
}

function initialTheme() {
  const saved = localStorage.getItem('momir-theme');
  if (saved === 'light' || saved === 'dark') return saved;
  return window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function clampCopies(input) {
  const value = Number(input.value || 1);
  return Math.max(1, Math.min(20, Number.isFinite(value) ? value : 1));
}

async function postJson(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Request failed.');
  return data;
}

function renderHistory(items = []) {
  if (!items.length) {
    historyList.innerHTML = '<div class="meta">No prints yet.</div>';
    return;
  }

  historyList.innerHTML = items.map((item) => `
    <div class="history-item">
      <div>
        <div class="history-title">${escapeHtml(item.name)}</div>
        <div class="meta">${historyMeta(item)}</div>
      </div>
      <div class="history-actions">
        <button class="secondary history-reprint" data-history-id="${escapeHtml(item.history_id)}">Reprint</button>
      </div>
    </div>
  `).join('');
}

function historyMeta(item) {
  const parts = [
    item.type_line || item.kind || 'Card',
    item.copies ? `Copies: ${item.copies}` : '',
    item.color_text || ((item.colors || []).length ? `Color: ${(item.colors || []).join('')}` : ''),
    item.pt ? `P/T: ${item.pt}` : ''
  ].filter(Boolean);
  return parts.map(escapeHtml).join(' | ');
}

async function refreshHistory() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    renderHistory(data.history || []);
  } catch (_) {}
}

async function printMomir(cmc, button) {
  setStatus(document.getElementById('momirStatus'), `Printing mana value ${cmc}...`);
  button.disabled = true;
  try {
    const data = await postJson('/api/momir-print', {cmc});
    renderHistory(data.history || []);
    setStatus(document.getElementById('momirStatus'), `Printed ${data.item.name}.`, 'good');
  } catch (error) {
    setStatus(document.getElementById('momirStatus'), error.message, 'error');
  } finally {
    button.disabled = false;
  }
}

for (let i = 1; i <= 16; i++) {
  const btn = document.createElement('button');
  btn.textContent = i;
  btn.className = 'primary';
  btn.addEventListener('click', () => printMomir(i, btn));
  cmcGrid.appendChild(btn);
}

function optionImage(option) {
  return option.display_image_url || option.source_image || option.image_url || '';
}

function openChoiceModal(title, mode, options, copies) {
  modalMode = mode;
  modalCopies = copies;
  modalTitle.textContent = title;
  modalList.innerHTML = options.map((option) => `
    <div class="choice">
      ${optionImage(option) ? `<img src="${escapeHtml(optionImage(option))}" alt="${escapeHtml(option.name)}">` : '<div></div>'}
      <div class="choice-body">
        <div class="choice-title">${escapeHtml(option.name)}</div>
        <div class="meta">${optionMeta(option)}</div>
        ${option.oracle_text ? `<div class="oracle">${escapeHtml(option.oracle_text)}</div>` : ''}
        <button class="primary modal-choice" data-id="${escapeHtml(option.id)}">Choose & Print</button>
      </div>
    </div>
  `).join('');
  choiceModal.classList.add('active');
}

function closeChoiceModal() {
  choiceModal.classList.remove('active');
  modalList.innerHTML = '';
  modalMode = null;
}

function optionMeta(option) {
  if (option.kind === 'token') {
    return `${escapeHtml(option.color_text || (option.colors || []).join('') || 'Colorless')} | ${escapeHtml(option.pt || '?/?')}`;
  }
  return `Mana Value: ${escapeHtml(option.cmc)} | ${escapeHtml(option.type_line || '')}`;
}

async function printTokenById(tokenId, copies) {
  const data = await postJson('/api/print-token', {token_id: tokenId, copies});
  renderHistory(data.history || []);
  setStatus(tokenStatus, `Printed ${data.item.name} x${data.printed}.`, 'good');
  return data;
}

async function printCardById(cardId, copies) {
  const data = await postJson('/api/print-card', {card_id: cardId, copies});
  renderHistory(data.history || []);
  setStatus(cardStatus, `Printed ${data.item.name} x${data.printed}.`, 'good');
  return data;
}

async function handleTokenPrint() {
  const query = tokenQuery.value.trim();
  if (!query) return;
  setStatus(tokenStatus, 'Searching...');
  tokenPrintBtn.disabled = true;

  try {
    const data = await postJson('/api/token-options', {query});
    const options = data.options || [];
    if (!options.length) {
      setStatus(tokenStatus, 'No matching tokens found.', 'error');
    } else if (options.length === 1) {
      setStatus(tokenStatus, 'Printing token...');
      await printTokenById(options[0].id, clampCopies(tokenCopies));
    } else {
      setStatus(tokenStatus, `Found ${options.length} token options. Choose one to print.`);
      openChoiceModal('Choose Token', 'token', options, clampCopies(tokenCopies));
    }
  } catch (error) {
    setStatus(tokenStatus, error.message, 'error');
  } finally {
    tokenPrintBtn.disabled = false;
  }
}

async function handleCardPrint() {
  const query = cardQuery.value.trim();
  if (!query) return;
  setStatus(cardStatus, 'Searching...');
  cardPrintBtn.disabled = true;

  try {
    const data = await postJson('/api/card-options', {query});
    const options = data.options || [];
    if (!options.length) {
      setStatus(cardStatus, 'No matching cards found.', 'error');
    } else if (options.length === 1) {
      setStatus(cardStatus, 'Printing card...');
      await printCardById(options[0].id, clampCopies(cardCopies));
    } else {
      setStatus(cardStatus, `Found ${options.length} card options. Choose one to print.`);
      openChoiceModal('Choose Card', 'card', options, clampCopies(cardCopies));
    }
  } catch (error) {
    setStatus(cardStatus, error.message, 'error');
  } finally {
    cardPrintBtn.disabled = false;
  }
}

tokenPrintBtn.addEventListener('click', handleTokenPrint);
tokenQuery.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') handleTokenPrint();
});

cardPrintBtn.addEventListener('click', handleCardPrint);
cardQuery.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') handleCardPrint();
});

historyToggle.addEventListener('click', () => {
  const collapsed = historyPanel.classList.toggle('collapsed');
  historyToggle.textContent = collapsed ? 'Show' : 'Hide';
});

historyList.addEventListener('click', async (event) => {
  const button = event.target.closest('.history-reprint');
  if (!button) return;
  setStatus(historyStatus, 'Reprinting...');
  button.disabled = true;
  try {
    const data = await postJson('/api/reprint-history', {history_id: button.dataset.historyId});
    renderHistory(data.history || []);
    setStatus(historyStatus, `Reprinted ${data.item.name}.`, 'good');
  } catch (error) {
    setStatus(historyStatus, error.message, 'error');
    button.disabled = false;
  }
});

modalClose.addEventListener('click', closeChoiceModal);
choiceModal.addEventListener('click', (event) => {
  if (event.target === choiceModal) closeChoiceModal();
});
modalList.addEventListener('click', async (event) => {
  const button = event.target.closest('.modal-choice');
  if (!button || !modalMode) return;
  button.disabled = true;
  try {
    if (modalMode === 'token') {
      setStatus(tokenStatus, 'Printing token...');
      await printTokenById(button.dataset.id, modalCopies);
    } else {
      setStatus(cardStatus, 'Printing card...');
      await printCardById(button.dataset.id, modalCopies);
    }
    closeChoiceModal();
  } catch (error) {
    if (modalMode === 'token') setStatus(tokenStatus, error.message, 'error');
    if (modalMode === 'card') setStatus(cardStatus, error.message, 'error');
    button.disabled = false;
  }
});

window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  deferredPrompt = event;
  installBtn.hidden = false;
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.hidden = true;
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(() => {});
}

applyTheme(initialTheme());
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.dataset.theme === 'dark' ? 'dark' : 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

refreshHistory();
setInterval(refreshHistory, 5000);
</script>
</body>
</html>
