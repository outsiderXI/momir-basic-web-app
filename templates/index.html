<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Momir Basic Printer</title>
  <meta name="theme-color" content="#17110b">
  <link rel="manifest" href="/manifest.json">
  <style>
    :root {
      --bg: #17110b;
      --felt: #243025;
      --card: #221913;
      --card2: #3a2a1f;
      --inset: #e1cfaa;
      --paper: #efe0bd;
      --ink: #24190f;
      --line: #92764d;
      --text: #f5ead2;
      --muted: #d8c59f;
      --gold: #c9a35d;
      --blue: #5d8fbd;
      --green: #4e8d59;
      --red: #a9503a;
      --black: #1f1a17;
      --white: #eadfbf;
      --danger: #ff9a8c;
      --shadow: 0 18px 34px rgba(0, 0, 0, .38);
      --sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .025) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255, 255, 255, .018) 1px, transparent 1px),
        radial-gradient(circle at 18% 8%, rgba(201, 163, 93, .22), transparent 30%),
        radial-gradient(circle at 80% 0%, rgba(77, 122, 172, .16), transparent 32%),
        linear-gradient(145deg, #302417, var(--felt) 44%, var(--bg));
      background-size: 28px 28px, 28px 28px, auto, auto, auto;
    }

    .wrap {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .wrap::before {
      content: "";
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--white), var(--blue), var(--black), var(--red), var(--green));
      box-shadow: 0 0 22px rgba(201, 163, 93, .4);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .panel {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 246, 220, .08), transparent 35%),
        linear-gradient(145deg, var(--card2), var(--card));
      border: 2px solid #0d0906;
      border-radius: 8px;
      box-shadow: var(--shadow), inset 0 0 0 2px rgba(201, 163, 93, .55), inset 0 0 0 6px rgba(0, 0, 0, .42);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .panel.momir {
      box-shadow: var(--shadow), inset 0 0 0 2px rgba(78, 141, 89, .8), inset 0 0 0 6px rgba(0, 0, 0, .42);
    }

    .panel.token {
      box-shadow: var(--shadow), inset 0 0 0 2px rgba(31, 26, 23, .9), inset 0 0 0 6px rgba(0, 0, 0, .42);
    }

    .panel.card-search {
      box-shadow: var(--shadow), inset 0 0 0 2px rgba(93, 143, 189, .74), inset 0 0 0 6px rgba(0, 0, 0, .42);
    }

    .panel.history-panel {
      box-shadow: var(--shadow), inset 0 0 0 2px rgba(201, 163, 93, .78), inset 0 0 0 6px rgba(0, 0, 0, .42);
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 8px;
      pointer-events: none;
      border: 1px solid rgba(239, 224, 189, .18);
      border-radius: 5px;
    }

    .panel > * {
      position: relative;
      z-index: 1;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.7rem;
      line-height: 1.1;
      color: #f3dfaa;
      text-shadow: 0 2px 0 #140d08, 0 0 18px rgba(201, 163, 93, .28);
    }

    h2 {
      min-height: 42px;
      padding: 9px 12px;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, .22), transparent 38%),
        linear-gradient(180deg, #e8d6ae, #caa86f);
      border: 1px solid #6d4b24;
      border-radius: 7px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .35), 0 2px 0 rgba(0, 0, 0, .36);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.08rem;
      line-height: 1.2;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    h3 {
      font-size: .95rem;
      line-height: 1.2;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 4px 2px 0;
    }

    .brand {
      display: grid;
      gap: 8px;
    }

    .mana-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .pip {
      width: 24px;
      height: 24px;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, .58);
      color: #17110b;
      font-size: .72rem;
      font-weight: 900;
      box-shadow: inset 0 1px 3px rgba(255, 255, 255, .5), inset 0 -2px 4px rgba(0, 0, 0, .34), 0 2px 5px rgba(0, 0, 0, .25);
    }

    .pip.w { background: var(--white); }
    .pip.u { background: var(--blue); color: #07111b; }
    .pip.b { background: var(--black); color: #e8d8bf; }
    .pip.r { background: var(--red); color: #fff0dc; }
    .pip.g { background: var(--green); color: #061108; }

    .install {
      width: auto;
      min-width: 112px;
    }

    .cmc-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .cmc-grid button {
      min-height: 54px;
      border-radius: 50%;
      aspect-ratio: 1;
      justify-self: center;
      width: min(100%, 58px);
      font-size: 1.08rem;
      background:
        radial-gradient(circle at 35% 28%, #f8e9ba, #c9a35d 42%, #6f441f 100%);
      border-color: #3a210d;
    }

    button, input {
      border: 1px solid #6d4b24;
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      font: inherit;
    }

    button {
      min-height: 44px;
      padding: 10px 12px;
      font-weight: 750;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .28), 0 2px 0 rgba(0, 0, 0, .35);
    }

    button:hover:not(:disabled) { filter: brightness(1.07) saturate(1.04); transform: translateY(-1px); }
    button:disabled { opacity: .6; cursor: wait; }

    button.primary {
      background: linear-gradient(180deg, #d8bd7f, #a77831);
      color: #1d1208;
    }

    button.secondary {
      background: linear-gradient(180deg, #415a73, #1a2a3a);
      color: #f1e6ce;
      border-color: #7893ad;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, .18);
    }

    input:focus {
      outline: 2px solid rgba(201, 163, 93, .72);
      outline-offset: 2px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #eadbb8;
      font-size: .88rem;
      font-weight: 700;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: .92rem;
    }

    .status.error { color: var(--danger); }
    .status.good { color: #bde7ac; }

    .options {
      display: grid;
      gap: 10px;
    }

    .choice, .history-item {
      display: grid;
      gap: 8px;
      padding: 12px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .16), transparent 28%),
        var(--inset);
      border: 1px solid #7c6039;
      border-radius: 8px;
      color: var(--ink);
      box-shadow: inset 0 0 0 2px rgba(255, 246, 220, .24);
    }

    .choice-title, .history-title {
      font-weight: 800;
      line-height: 1.2;
      font-family: Georgia, "Times New Roman", serif;
    }

    .meta {
      color: #59452c;
      font-size: .86rem;
      line-height: 1.35;
    }

    .oracle {
      color: #2e2115;
      font-size: .88rem;
      line-height: 1.35;
      white-space: pre-line;
      padding-top: 6px;
      border-top: 1px solid rgba(73, 50, 26, .28);
    }

    .selected {
      display: none;
      gap: 10px;
      padding-top: 2px;
    }

    .selected.active {
      display: grid;
    }

    .history {
      display: grid;
      gap: 10px;
    }

    .history-panel {
      grid-column: 1 / -1;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .wrap { padding: 12px; }
      .topbar { align-items: start; }
      .row { grid-template-columns: 1fr; }
      .cmc-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
<main class="wrap">
  <div class="topbar">
    <div class="brand">
      <h1>Momir Basic Printer</h1>
      <div class="mana-row" aria-hidden="true">
        <span class="pip w">W</span>
        <span class="pip u">U</span>
        <span class="pip b">B</span>
        <span class="pip r">R</span>
        <span class="pip g">G</span>
      </div>
    </div>
    <button id="installBtn" class="secondary install" hidden>Install</button>
  </div>

  <div class="grid">
    <section class="panel momir">
      <h2>Momir Basic</h2>
      <div class="cmc-grid" id="cmcGrid"></div>
      <div id="momirStatus" class="status"></div>
    </section>

    <section class="panel token">
      <h2>Token Print</h2>
      <label>
        Token name
        <input id="tokenQuery" autocomplete="off" placeholder="Rat">
      </label>
      <button id="tokenSearchBtn" class="secondary">Find Token</button>
      <div id="tokenStatus" class="status"></div>
      <div id="tokenOptions" class="options"></div>
      <div id="selectedToken" class="selected">
        <h3 id="selectedTokenName"></h3>
        <div class="row">
          <label>
            Copies
            <input id="tokenCopies" type="number" min="1" max="20" value="1">
          </label>
          <button id="tokenPrintBtn" class="primary">Print</button>
        </div>
      </div>
    </section>

    <section class="panel card-search">
      <h2>Any Card Print</h2>
      <label>
        Card name
        <input id="cardQuery" autocomplete="off" placeholder="Sol Ring">
      </label>
      <button id="cardSearchBtn" class="secondary">Find Card</button>
      <div id="cardStatus" class="status"></div>
      <div id="cardOptions" class="options"></div>
      <div id="selectedCard" class="selected">
        <h3 id="selectedCardName"></h3>
        <div class="row">
          <label>
            Copies
            <input id="cardCopies" type="number" min="1" max="20" value="1">
          </label>
          <button id="cardPrintBtn" class="primary">Print</button>
        </div>
      </div>
    </section>

    <section class="panel history-panel">
      <h2>Print History</h2>
      <div id="historyList" class="history"></div>
    </section>
  </div>
</main>

<script>
let deferredPrompt = null;
let selectedTokenId = null;
let selectedCardId = null;

const cmcGrid = document.getElementById('cmcGrid');
const installBtn = document.getElementById('installBtn');
const historyList = document.getElementById('historyList');

const tokenQuery = document.getElementById('tokenQuery');
const tokenSearchBtn = document.getElementById('tokenSearchBtn');
const tokenStatus = document.getElementById('tokenStatus');
const tokenOptions = document.getElementById('tokenOptions');
const selectedToken = document.getElementById('selectedToken');
const selectedTokenName = document.getElementById('selectedTokenName');
const tokenCopies = document.getElementById('tokenCopies');
const tokenPrintBtn = document.getElementById('tokenPrintBtn');

const cardQuery = document.getElementById('cardQuery');
const cardSearchBtn = document.getElementById('cardSearchBtn');
const cardStatus = document.getElementById('cardStatus');
const cardOptions = document.getElementById('cardOptions');
const selectedCard = document.getElementById('selectedCard');
const selectedCardName = document.getElementById('selectedCardName');
const cardCopies = document.getElementById('cardCopies');
const cardPrintBtn = document.getElementById('cardPrintBtn');

function escapeHtml(text = '') {
  return String(text).replace(/[&<>"']/g, (m) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[m]));
}

function setStatus(el, message, kind = '') {
  el.className = `status ${kind}`.trim();
  el.textContent = message || '';
}

function clampCopies(input) {
  const value = Number(input.value || 1);
  return Math.max(1, Math.min(20, Number.isFinite(value) ? value : 1));
}

async function postJson(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || 'Request failed.');
  return data;
}

function renderHistory(items = []) {
  if (!items.length) {
    historyList.innerHTML = '<div class="meta">No prints yet.</div>';
    return;
  }

  historyList.innerHTML = items.map((item) => `
    <div class="history-item">
      <div class="history-title">${escapeHtml(item.name)}</div>
      <div class="meta">
        ${escapeHtml(item.type_line || item.kind || 'Card')}
        ${item.copies ? ` | Copies: ${escapeHtml(item.copies)}` : ''}
        ${item.printed_at ? ` | ${escapeHtml(item.printed_at)}` : ''}
      </div>
    </div>
  `).join('');
}

async function refreshHistory() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    renderHistory(data.history || []);
  } catch (_) {}
}

async function printMomir(cmc, button) {
  setStatus(document.getElementById('momirStatus'), `Printing mana value ${cmc}...`);
  button.disabled = true;
  try {
    const data = await postJson('/api/momir-print', {cmc});
    renderHistory(data.history || []);
    setStatus(document.getElementById('momirStatus'), `Printed ${data.item.name}.`, 'good');
  } catch (error) {
    setStatus(document.getElementById('momirStatus'), error.message, 'error');
  } finally {
    button.disabled = false;
  }
}

for (let i = 1; i <= 16; i++) {
  const btn = document.createElement('button');
  btn.textContent = i;
  btn.className = 'primary';
  btn.addEventListener('click', () => printMomir(i, btn));
  cmcGrid.appendChild(btn);
}

function renderTokenOptions(options = []) {
  selectedTokenId = null;
  selectedToken.classList.remove('active');

  if (!options.length) {
    tokenOptions.innerHTML = '';
    return;
  }

  tokenOptions.innerHTML = options.map((token) => `
    <div class="choice">
      <div class="choice-title">${escapeHtml(token.name)}</div>
      <div class="meta">${escapeHtml(token.color_text || (token.colors || []).join('') || 'Colorless')} | ${escapeHtml(token.pt || '?/?')}</div>
      ${token.oracle_text ? `<div class="oracle">${escapeHtml(token.oracle_text)}</div>` : ''}
      <button class="primary token-choice" data-token-id="${escapeHtml(token.id)}" data-token-name="${escapeHtml(token.name)}">Choose</button>
    </div>
  `).join('');
}

function chooseToken(id, name) {
  selectedTokenId = id;
  selectedTokenName.textContent = name;
  selectedToken.classList.add('active');
  setStatus(tokenStatus, 'Token selected.', 'good');
}

async function findTokens() {
  const query = tokenQuery.value.trim();
  if (!query) return;
  setStatus(tokenStatus, 'Searching...');
  tokenSearchBtn.disabled = true;
  tokenOptions.innerHTML = '';
  selectedToken.classList.remove('active');

  try {
    const data = await postJson('/api/token-options', {query});
    renderTokenOptions(data.options || []);
    setStatus(tokenStatus, data.options?.length ? `Found ${data.options.length} option(s).` : 'No matching tokens found.', data.options?.length ? '' : 'error');
  } catch (error) {
    setStatus(tokenStatus, error.message, 'error');
  } finally {
    tokenSearchBtn.disabled = false;
  }
}

async function printToken() {
  if (!selectedTokenId) return;
  setStatus(tokenStatus, 'Printing token...');
  tokenPrintBtn.disabled = true;
  try {
    const data = await postJson('/api/print-token', {
      token_id: selectedTokenId,
      copies: clampCopies(tokenCopies)
    });
    renderHistory(data.history || []);
    setStatus(tokenStatus, `Printed ${data.item.name} x${data.printed}.`, 'good');
  } catch (error) {
    setStatus(tokenStatus, error.message, 'error');
  } finally {
    tokenPrintBtn.disabled = false;
  }
}

function renderCardOptions(options = []) {
  selectedCardId = null;
  selectedCard.classList.remove('active');

  if (!options.length) {
    cardOptions.innerHTML = '';
    return;
  }

  cardOptions.innerHTML = options.map((card) => `
    <div class="choice">
      <div class="choice-title">${escapeHtml(card.name)}</div>
      <div class="meta">Mana Value: ${escapeHtml(card.cmc)} | ${escapeHtml(card.type_line || '')}</div>
      <button class="primary card-choice" data-card-id="${escapeHtml(card.id)}" data-card-name="${escapeHtml(card.name)}">Choose</button>
    </div>
  `).join('');
}

function chooseCard(id, name) {
  selectedCardId = id;
  selectedCardName.textContent = name;
  selectedCard.classList.add('active');
  setStatus(cardStatus, 'Card selected.', 'good');
}

async function findCards() {
  const query = cardQuery.value.trim();
  if (!query) return;
  setStatus(cardStatus, 'Searching...');
  cardSearchBtn.disabled = true;
  cardOptions.innerHTML = '';
  selectedCard.classList.remove('active');

  try {
    const data = await postJson('/api/card-options', {query});
    renderCardOptions(data.options || []);
    setStatus(cardStatus, `Found ${data.options.length} option(s).`);
  } catch (error) {
    setStatus(cardStatus, error.message, 'error');
  } finally {
    cardSearchBtn.disabled = false;
  }
}

async function printCard() {
  if (!selectedCardId) return;
  setStatus(cardStatus, 'Printing card...');
  cardPrintBtn.disabled = true;
  try {
    const data = await postJson('/api/print-card', {
      card_id: selectedCardId,
      copies: clampCopies(cardCopies)
    });
    renderHistory(data.history || []);
    setStatus(cardStatus, `Printed ${data.item.name} x${data.printed}.`, 'good');
  } catch (error) {
    setStatus(cardStatus, error.message, 'error');
  } finally {
    cardPrintBtn.disabled = false;
  }
}

tokenSearchBtn.addEventListener('click', findTokens);
tokenPrintBtn.addEventListener('click', printToken);
tokenOptions.addEventListener('click', (event) => {
  const button = event.target.closest('.token-choice');
  if (!button) return;
  chooseToken(button.dataset.tokenId, button.dataset.tokenName);
});
tokenQuery.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') findTokens();
});

cardSearchBtn.addEventListener('click', findCards);
cardPrintBtn.addEventListener('click', printCard);
cardOptions.addEventListener('click', (event) => {
  const button = event.target.closest('.card-choice');
  if (!button) return;
  chooseCard(button.dataset.cardId, button.dataset.cardName);
});
cardQuery.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') findCards();
});

window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  deferredPrompt = event;
  installBtn.hidden = false;
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.hidden = true;
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(() => {});
}

refreshHistory();
setInterval(refreshHistory, 5000);
</script>
</body>
</html>
